version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - asciicheck
    - bidichk
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilerr
    - nolintlint
    - perfsprint
    - staticcheck
    - unconvert
    - unused
    - usestdlibvars
    - whitespace

  disable:
    - err113
    - lll
    - mnd
    - varnamelen
    - wrapcheck

  exclusions:
    rules:
      - path: _test\.go
        linters: [gosec]

  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true
      require-specific: true

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
